name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel older in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  CONTAINER_PORT: 5378

jobs:
  # ---------------------------------------------------------
  # CI: install, lint, build the React app, upload dist/
  # ---------------------------------------------------------
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Uses --if-present so this doesn't fail if you don't have a lint script yet
      - name: Lint
        run: npm run lint --if-present

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 3

  # ---------------------------------------------------------
  # CD: build the Docker image, smoke-test the container,
  # then push it to GitHub Container Registry
  # ---------------------------------------------------------
  docker:
    name: Build, Test & Push Container
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Build once, load it locally so we can smoke-test the container
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ci-test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Actually run the container and hit it, so a broken nginx.conf
      # or bad build fails the pipeline instead of silently shipping
      - name: Run container smoke test
        run: |
          docker run -d --name test-container -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} ci-test-image:latest

          echo "Waiting for container to become healthy..."
          for i in $(seq 1 10); do
            if curl -sf http://localhost:${{ env.CONTAINER_PORT }}/ > /dev/null; then
              echo "Container responded successfully."
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Container did not respond in time. Logs:"
              docker logs test-container
              exit 1
            fi
            sleep 2
          done

          docker logs test-container
          docker stop test-container
          docker rm test-container

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only push on actual pushes to main (not on PRs)
      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
